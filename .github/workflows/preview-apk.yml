name: Upload Release APK
on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Upload Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}-${{ hashFiles('**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - uses: android-actions/setup-android@v3
      - uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: jni/deltachat-core-rust

      - name: Get deltachat-core-rust submodule hash
        id: core-hash
        run: echo "hash=$(git rev-parse HEAD:jni/deltachat-core-rust)" >> $GITHUB_OUTPUT

      - name: Restore compiled core
        id: core-cache
        uses: actions/cache/restore@v4
        with:
          path: |
            jni/arm64-v8a
            libs/arm64-v8a
          key: core-arm64-v8a-${{ steps.core-hash.outputs.hash }}-${{ hashFiles('jni/Android.mk', 'jni/Application.mk', 'jni/dc_wrapper.c', 'scripts/ndk-make.sh') }}-ndk-r27

      - name: Compile core
        if: steps.core-cache.outputs.cache-hit != 'true'
        env:
          ANDROID_NDK_ROOT: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          rustup target add aarch64-linux-android
          export PATH="${PATH}:${ANDROID_NDK_ROOT}/toolchains/llvm/prebuilt/linux-x86_64/bin/"
          scripts/install-toolchains.sh && scripts/ndk-make.sh arm64-v8a

      - name: Setup keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
          chmod 600 ${{ github.workspace }}/release.keystore

          # Имена ТОЧНО как в build.gradle signingConfigs
          echo "DC_RELEASE_STORE_FILE=${{ github.workspace }}/release.keystore" >> gradle.properties
          echo "DC_RELEASE_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> gradle.properties
          echo "DC_RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> gradle.properties
          echo "DC_RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties

          # Для apksigner в следующих шагах
          echo "STORE_FILE=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Build APK
        run: ./gradlew --no-daemon -PABI_FILTER=arm64-v8a assembleFossRelease

      - name: ZipAlign APK
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          ZIPALIGN="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/zipalign"

          INPUT_APK=$(find build/outputs/apk/foss/release -name "*.apk" ! -name "*-unaligned.apk" | head -n 1)
          OUTPUT_APK="${INPUT_APK%.apk}-aligned.apk"

          echo "Aligning: $INPUT_APK -> $OUTPUT_APK"
          $ZIPALIGN -v -p 4 "$INPUT_APK" "$OUTPUT_APK"

          echo "FINAL_APK=$OUTPUT_APK" >> $GITHUB_ENV

      - name: Sign APK with apksigner
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          echo "Signing: ${{ env.FINAL_APK }}"
          $APKSIGNER sign \
            --ks "$STORE_FILE" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$KEYSTORE_PASSWORD" \
            --key-pass pass:"$KEY_PASSWORD" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "${{ env.FINAL_APK }}" \
            "${{ env.FINAL_APK }}"

      - name: Verify Signature
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | tail -n 1)
          APKSIGNER="$ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner"

          echo "Verifying signature..."
          $APKSIGNER verify --verbose ${{ env.FINAL_APK }}
          if [ $? -ne 0 ]; then
            echo "Signature verification failed!"
            exit 1
          fi
          echo "Signature verified successfully."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-preview.apk
          path: ${{ env.FINAL_APK }}
